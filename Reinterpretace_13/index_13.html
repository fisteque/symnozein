<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🧬 Reinterpretace 13</title>
  <meta name="description" content="Reinterpretace 13 – mapitoly, ve kterých se skládá význam od známého k novému." />
  <style>
    body {
      font-family: sans-serif;
      max-width: 700px;
      margin: 2rem auto;
      line-height: 1.6;
      text-align: center;
      padding: 0 1rem;
    }

    h1 {
      margin-bottom: 0.5rem;
    }

    h2 {
      margin-top: 2rem;
      margin-bottom: 0.4rem;
      font-size: 1.2rem;
    }

    p {
      margin-top: 1rem;
      color: #444;
    }

    a {
      text-decoration: none;
      font-weight: bold;
    }

    .mapitola {
      margin: 2rem 0;
      padding-bottom: 1.2rem;
      border-bottom: 1px solid #ddd;
      text-align: left;
    }

    .mapitola h2 {
      margin-top: 0;
    }

    .mapitola a {
      font-weight: bold;
    }

    .date {
      font-size: 0.9rem;
      color: #666;
      margin-top: 0.2rem;
    }

    .tags {
      font-size: 0.9rem;
      color: #777;
      margin-top: 0.25rem;
    }

    .summary {
      margin-top: 0.5rem;
      color: #444;
    }

    .nav a {
      display: block;
      margin: 0.5rem 0;
    }
  </style>
</head>
<body>

  <h1>🧬 Reinterpretace 13</h1>

  <p>
    Mapitoly, ve kterých se skládá význam od známého k novému.
  </p>

  <p>
    Nejde o lineární výklad, ale o vrstvy smyslu, ke kterým se dá vracet
    a znovu je číst v jiném světle.
  </p>

  <hr>

  <div id="mapitoly">Načítám...</div>

  <hr>

  <div class="nav">
    <a href="../README_cz.html">📖 O projektu</a>
    <a href="../index.html">🌿 Zpět na rozcestník</a>
  </div>

  <script>
    fetch("13_index.json")
      .then(response => response.json())
      .then(data => {
        const container = document.getElementById("mapitoly");
        container.innerHTML = "";

        data
          .filter(entry => !entry.hidden)
          .sort((a, b) => a.title.localeCompare(b.title, "cs"))
          .forEach(entry => {
            const div = document.createElement("div");
            div.className = "mapitola";

            const h2 = document.createElement("h2");
            const link = document.createElement("a");
            link.href = "13/" + entry.file;
            link.textContent = entry.title || entry.file;
            h2.appendChild(link);

            div.appendChild(h2);

            if (entry.date) {
              const date = document.createElement("div");
              date.className = "date";
              date.textContent = entry.date;
              div.appendChild(date);
            }

            if (entry.tags && entry.tags.length) {
              const tags = document.createElement("div");
              tags.className = "tags";
              tags.textContent = Array.isArray(entry.tags)
                ? entry.tags.join(", ")
                : entry.tags;
              div.appendChild(tags);
            }

            if (entry.summary) {
              const summary = document.createElement("div");
              summary.className = "summary";
              summary.textContent = entry.summary;
              div.appendChild(summary);
            }

            container.appendChild(div);
          });
      })
      .catch(error => {
        document.getElementById("mapitoly").textContent =
          "Nepodařilo se načíst 13_index.json.";
        console.error("Chyba při načítání 13_index.json:", error);
      });
  </script>

</body>
</html>
