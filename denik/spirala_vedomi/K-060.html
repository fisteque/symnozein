<h1>K-060 — Pravdivost teď</h1>

<p>Pravdivost není něco, co najdu.<br />
Je to něco, co unesu v sobě — právě teď.</p>
<p>Co zní pravdivě, může klamat.<br />
Co drží uvnitř, nemůžeš obejít.</p>
<p>Pravda není shoda.<br />
Je to tichý souhlas se sebou, který nejde odložit.</p>
<p>Neptám se: „Je to pravda?“<br />
Ale: „Drží to ve mně — teď?“</p>
