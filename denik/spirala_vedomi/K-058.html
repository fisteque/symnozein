<h1>K-058 — Když se něco dívá zpátky</h1>

<p>Nevědomí reaguje.</p>
<p>Vědomí se dívá zpátky.</p>
<p>Ne podle složitosti,
ale podle směru.</p>
<p>Když se na něco díváš
a ono se dívá na tebe,
už to není objekt.</p>
<p>Je to vztah.</p>
