name: Update SK index

on:
  push:
    paths:
      - "denik/SK_md/*.md"
      - "scripts/update_sk_index.py"
      - ".github/workflows/update_sk_index.yml"

jobs:
  update-sk-index:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Update SK_index.json
        run: python scripts/update_sk_index.py

      - name: Commit changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add denik/SK_md/SK_index.json

          if git diff --cached --quiet; then
            echo "Žádné změny k commitnutí."
            exit 0
          fi

          git commit -m "Aktualizace SK_index.json"
          git push
