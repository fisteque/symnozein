name: Update Symnozein index

on:
  push:
    paths:
      - 'Symnozein/*.md'
      - '.github/workflows/update_symnozein_index.yml'
      - 'scripts/update_symnozein_index.py'

permissions:
  contents: write

jobs:
  update-symnozein:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          pip install pyyaml

      - name: Run Symnozein index script
        run: |
          python scripts/update_symnozein_index.py

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Pull latest changes (avoid push conflicts)
        run: |
          git pull --rebase origin main || true

      - name: Commit and push generated files
        run: |
          [ -f Symnozein/index.json ] && git add Symnozein/index.json
          [ -f Symnozein/index_prev.json ] && git add Symnozein/index_prev.json
          [ -f Symnozein/diff.md ] && git add Symnozein/diff.md

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "🛠️ Update Symnozein index, prev index and diff"
          git push
