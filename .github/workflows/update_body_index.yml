name: Update body index

on:
  push:
    paths:
      - 'body/**'
      - 'scripts/update_body_index.py'

jobs:
  update-index:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5

      - name: Run index script
        run: python scripts/update_body_index.py

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add body/body_index.json body/body_index_prev.json body/body_diff.md

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update body index, previous index and diff"
            git push
          fi
