name: Update body index

on:
  push:
    paths:
      - 'body/**'
      - '.github/workflows/update_body_index.yml'
      - 'scripts/update_body_index.py'

permissions:
  contents: write

jobs:
  update-body:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run body index script
        run: |
          python scripts/update_body_index.py

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit and push generated files
        run: |
          git add body/body_index.json
          git add body/body_index_prev.json
          git add body/body_diff.md

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "🛠️ Update body index, prev index and diff"
          git push
