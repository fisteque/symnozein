name: Update Material Index

on:
  push:
    paths:
      - 'Reinterpretace_13/material_md/*.md'
      - '.github/workflows/update_material_index.yml'
      - 'scripts/update_material_index.py'

permissions:
  contents: write

jobs:
  update-material:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          pip install pyyaml

      - name: Run material index script
        run: |
          python scripts/update_material_index.py

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit and push generated files
        run: |
          git add Reinterpretace_13/material_index.json
          git add Reinterpretace_13/material_index_prev.json
          git add Reinterpretace_13/material_diff.md

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "🛠️ Update material index, prev index and diff"
          git push
